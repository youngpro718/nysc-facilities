name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        # Non-blocking: the codebase has pre-existing lint debt (mostly a
        # service-layer import rule). CI still surfaces the report so the
        # debt is visible, but won't gate merges until it's cleaned up.
        continue-on-error: true
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:run

      - name: Build
        env:
          # Build needs non-empty values to pass env var destructuring;
          # real secrets are injected by the deploy platform, not CI.
          VITE_SUPABASE_URL: https://ci-placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-placeholder-anon-key
        run: npm run build
